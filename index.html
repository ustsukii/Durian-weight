<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ชั่งทุเรียน</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --green:#2d7a3a;--green-dark:#1e5628;--green-light:#e8f5eb;--green-mid:#4caf63;
    --bg:#f4f7f4;--card:#fff;--border:#cde0d0;--text:#1a2e1d;--muted:#5a7560;
    --red:#c0392b;--amber:#d97706;
    --ab:#2d7a3a;--c:#d97706;--d:#c0392b;
  }
  body{font-family:'Sarabun',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

  .screen{display:none}
  .screen.active{display:block}

  /* ── SELECTION SCREEN ── */
  #sel-header{background:var(--green-dark);padding:14px 14px 12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  #sel-header h1{color:#fff;font-size:19px;font-weight:800;margin-bottom:10px}
  #sel-new-btn{width:100%;background:#fff;color:var(--green-dark);border:none;border-radius:12px;padding:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
  #sel-new-btn:active{background:var(--green-light)}
  #sel-content{padding:14px}

  .year-section{background:var(--card);border-radius:14px;border:1.5px solid var(--border);margin-bottom:16px;overflow:hidden}
  .year-section-header{background:var(--green-dark);padding:10px 14px}
  .year-section-header span{color:#fff;font-size:14px;font-weight:700}
  .year-card{border-bottom:1px solid var(--border);padding:12px 14px}
  .year-card:last-child{border-bottom:none}
  .year-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
  .year-row{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:3px}
  .year-row strong{color:var(--green-dark);font-weight:800}

  .rounds-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
  .round-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);margin-bottom:12px;overflow:hidden}
  .round-card.is-active{border-color:var(--green);border-width:2px}
  .round-card-body{padding:12px 14px}
  .round-card-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .active-badge{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
  .round-card-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
  .round-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
  .rstat{background:var(--bg);border-radius:8px;padding:6px 8px;text-align:center}
  .rstat .rl{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px}
  .rstat .rv{font-size:13px;font-weight:800;color:var(--text)}
  .round-card-actions{display:flex;gap:6px}
  .btn-enter{flex:2;background:var(--green);color:#fff;border:none;border-radius:9px;padding:10px 8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-enter:active{background:var(--green-dark)}
  .btn-rename{flex:1;background:var(--green-light);color:var(--green-dark);border:none;border-radius:9px;padding:10px 8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-rename:active{opacity:.75}
  .btn-delround{flex:1;background:#fee2e2;color:var(--red);border:none;border-radius:9px;padding:10px 8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-delround:active{opacity:.75}
  .sel-spacer{height:30px}
  .no-rounds{text-align:center;padding:40px 20px;color:var(--muted)}
  .no-rounds .icon{font-size:44px;margin-bottom:10px}
  .no-rounds p{font-size:16px;font-weight:600}
  .no-rounds small{font-size:13px;opacity:.7}

  /* ── TRACKING SCREEN ── */
  #top-bar{position:sticky;top:0;z-index:100;background:var(--green-dark);padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  #round-name-display{color:#fff;font-size:15px;font-weight:700;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .top-actions{display:flex;gap:6px}
  .btn-sm{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn-sm:active{background:rgba(255,255,255,.3)}

  .input-row{display:flex;gap:8px;align-items:stretch}
  #weight-input{flex:1;font-size:28px;font-weight:700;border:2px solid rgba(255,255,255,.4);border-radius:12px;padding:10px 14px;background:rgba(255,255,255,.15);color:#fff;text-align:center;min-width:0;outline:none;font-family:inherit}
  #weight-input::placeholder{color:rgba(255,255,255,.5)}
  #weight-input:focus{border-color:#fff;background:rgba(255,255,255,.22)}
  #add-btn{background:#fff;color:var(--green-dark);border:none;border-radius:12px;padding:10px 18px;font-size:22px;font-weight:900;cursor:pointer;flex-shrink:0}
  #add-btn:active{transform:scale(.95)}

  .grade-row{display:flex;gap:6px;margin-top:8px}
  .grade-btn{flex:1;padding:9px 4px;border-radius:10px;border:2px solid transparent;font-size:16px;font-weight:800;cursor:pointer;transition:.15s;font-family:inherit}
  .grade-btn.ab{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}
  .grade-btn.c{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}
  .grade-btn.d{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}
  .grade-btn.active.ab{background:#fff;color:var(--ab)}
  .grade-btn.active.c{background:#fef3c7;color:var(--c);border-color:#fbbf24}
  .grade-btn.active.d{background:#fee2e2;color:var(--d);border-color:#f87171}

  #content{padding:12px 12px 0}
  .block-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);margin-bottom:14px;overflow:hidden}
  .block-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
  .block-title-left{display:flex;align-items:center;gap:8px}
  .grade-badge{font-size:13px;font-weight:800;padding:4px 10px;border-radius:20px}
  .grade-badge.AB{background:#e8f5eb;color:var(--ab)}
  .grade-badge.C{background:#fef3c7;color:var(--c)}
  .grade-badge.D{background:#fee2e2;color:var(--d)}
  .block-subtitle{font-size:12px;color:var(--muted);font-weight:600}
  .block-total{font-size:14px;font-weight:700;color:var(--text)}

  .entry-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0f0;gap:8px}
  .entry-row:last-child{border-bottom:none}
  .entry-row.highlight{background:#f0fdf4}
  .basket-num{font-size:13px;color:var(--muted);font-weight:700;min-width:28px}
  .entry-weight{font-size:20px;font-weight:800;color:var(--text);flex:1}
  .entry-weight span{font-size:13px;font-weight:500;color:var(--muted)}
  .entry-actions{display:flex;gap:6px}
  .btn-edit{background:var(--green-light);color:var(--green-dark);border:none;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-del{background:#fee2e2;color:var(--red);border:none;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-edit:active,.btn-del:active{transform:scale(.95)}

  .ctrl-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .ctrl-btn{flex:1;min-width:80px;background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:10px;padding:11px 8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .ctrl-btn:active{background:#e8f5eb}
  .ctrl-btn.danger{color:var(--red);border-color:#fca5a5}
  .ctrl-btn.danger:active{background:#fee2e2}

  .end-subround-btn{width:100%;background:none;border:1.5px dashed var(--border);color:var(--muted);border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:14px;font-family:inherit}
  .end-subround-btn:active{background:var(--green-light)}

  .price-section{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:14px;margin-bottom:14px}
  .price-section h3{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
  .price-row{display:flex;gap:8px;align-items:center}
  #price-input{flex:1;font-size:22px;font-weight:700;border:2px solid var(--border);border-radius:10px;padding:9px 12px;text-align:center;color:var(--text);background:#fff;outline:none;font-family:inherit}
  #price-input:focus{border-color:var(--green)}
  #confirm-price-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
  #confirm-price-btn:active{background:var(--green-dark)}
  .confirmed-price{margin-top:8px;font-size:13px;color:var(--muted)}
  .confirmed-price strong{color:var(--green-dark)}

  .spacer{height:170px}

  #summary-bar{position:fixed;bottom:0;left:0;right:0;background:var(--green-dark);padding:10px 14px 14px;z-index:100;box-shadow:0 -3px 12px rgba(0,0,0,.2)}
  .sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
  .sum-cell{background:rgba(255,255,255,.12);border-radius:8px;padding:6px 4px;text-align:center}
  .sum-cell .label{font-size:10px;color:rgba(255,255,255,.7);font-weight:600;margin-bottom:2px;letter-spacing:.3px}
  .sum-cell .val{font-size:15px;font-weight:800;color:#fff}
  .sum-cell.ab .val{color:#7defa0}
  .sum-cell.c .val{color:#fcd34d}
  .sum-cell.d .val{color:#fca5a5}
  .sum-bottom{display:flex;justify-content:space-between;align-items:center}
  .sum-total{color:#fff}
  .sum-total .label{font-size:11px;opacity:.75;font-weight:600}
  .sum-total .val{font-size:22px;font-weight:900}
  .sum-money{text-align:right;color:#7defa0}
  .sum-money .label{font-size:11px;opacity:.75;font-weight:600}
  .sum-money .val{font-size:22px;font-weight:900}

  /* ── MODALS ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal-box{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:360px}
  .modal-box h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text)}
  .modal-box input{width:100%;font-size:20px;border:2px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);outline:none;margin-bottom:12px;font-family:inherit}
  .modal-box input:focus{border-color:var(--green)}
  .modal-btns{display:flex;gap:8px}
  .modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
  .btn-cancel{background:#f0f0f0;color:var(--muted)}
  .btn-confirm{background:var(--green);color:#fff}

  .empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty-state .icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-size:16px;font-weight:600}
  .empty-state small{font-size:13px;opacity:.7}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     หน้าเลือกรอบ
══════════════════════════════════════ -->
<div id="screen-select" class="screen active">
  <div id="sel-header">
    <h1>🌿 ชั่งทุเรียน</h1>
    <button id="sel-new-btn" onclick="promptCreateRound()">➕ สร้างรอบใหม่</button>
  </div>
  <div id="sel-content">
    <div id="yearly-section"></div>
    <div class="rounds-label">รายการรอบการชั่ง</div>
    <div id="rounds-list"></div>
    <div class="sel-spacer"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     หน้าบันทึกน้ำหนัก
══════════════════════════════════════ -->
<div id="screen-track" class="screen">
  <div id="top-bar">
    <div class="top-row">
      <div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.5px">รอบตัด</div>
        <div id="round-name-display">—</div>
      </div>
      <div class="top-actions">
        <button class="btn-sm" onclick="goToSelect()">⬅ รอบ</button>
        <button class="btn-sm" onclick="exportCSV()">ส่งออก CSV</button>
      </div>
    </div>
    <div class="input-row">
      <input type="number" id="weight-input" inputmode="decimal" min="1" max="60" step="0.1" placeholder="น้ำหนัก (กก.)" autocomplete="off">
      <button id="add-btn" onclick="addEntry()">+</button>
    </div>
    <div class="grade-row">
      <button class="grade-btn ab active" id="grade-AB" onclick="setGrade('AB')">AB</button>
      <button class="grade-btn c" id="grade-C" onclick="setGrade('C')">C</button>
      <button class="grade-btn d" id="grade-D" onclick="setGrade('D')">D</button>
    </div>
  </div>

  <div id="content">
    <div style="height:10px"></div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="undoLast()">↩ เลิกทำ</button>
      <button class="ctrl-btn danger" onclick="deleteLastSubRound()">ลบบล็อกล่าสุด</button>
      <button class="ctrl-btn danger" onclick="resetActiveRound()">รีเซ็ต</button>
    </div>
    <div class="price-section">
      <h3>ราคา / กก.</h3>
      <div class="price-row">
        <input type="number" id="price-input" inputmode="decimal" min="0" placeholder="0.00">
        <button id="confirm-price-btn" onclick="confirmPrice()">ยืนยันราคา</button>
      </div>
      <div class="confirmed-price" id="confirmed-price-display"></div>
    </div>
    <div id="entries-container"></div>
    <div class="spacer"></div>
  </div>

  <div id="summary-bar">
    <div class="sum-grid">
      <div class="sum-cell ab"><div class="label">AB (กก.)</div><div class="val" id="sum-ab">0</div></div>
      <div class="sum-cell c"><div class="label">C (กก.)</div><div class="val" id="sum-c">0</div></div>
      <div class="sum-cell d"><div class="label">D (กก.)</div><div class="val" id="sum-d">0</div></div>
      <div class="sum-cell"><div class="label">รวม (กก.)</div><div class="val" id="sum-total">0</div></div>
    </div>
    <div class="sum-bottom">
      <div class="sum-total"><div class="label">น้ำหนักรวมทั้งหมด</div><div class="val" id="sum-grand">0 กก.</div></div>
      <div class="sum-money"><div class="label">ยอดเงินรวม</div><div class="val" id="sum-money">฿0</div></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MODALS
══════════════════════════════════════ -->
<div id="modal-create" class="modal-overlay">
  <div class="modal-box">
    <h2>สร้างรอบใหม่</h2>
    <input type="text" id="create-round-input" placeholder="ชื่อรอบ (ไม่บังคับ)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-create')">ยกเลิก</button>
      <button class="btn-confirm" onclick="createRound()">สร้าง</button>
    </div>
  </div>
</div>

<div id="modal-rename" class="modal-overlay">
  <div class="modal-box">
    <h2>เปลี่ยนชื่อรอบ</h2>
    <input type="text" id="rename-round-input" placeholder="ชื่อใหม่">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-rename')">ยกเลิก</button>
      <button class="btn-confirm" onclick="saveRename()">บันทึก</button>
    </div>
  </div>
</div>

<div id="modal-edit" class="modal-overlay">
  <div class="modal-box">
    <h2>แก้ไขน้ำหนัก</h2>
    <input type="number" id="edit-weight-input" inputmode="decimal" min="1" max="60" step="0.1" placeholder="น้ำหนักใหม่ (กก.)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-edit')">ยกเลิก</button>
      <button class="btn-confirm" onclick="saveEdit()">บันทึก</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let rounds = [];
let activeRoundId = null;
let renamingRoundId = null;
let editingEntryId = null;
let activeGrade = 'AB';

const LS_ROUNDS = 'durian_rounds';
const LS_ACTIVE = 'durian_active';

/* ══════════════════════════════════════
   PERSISTENCE
══════════════════════════════════════ */
function loadData() {
  try { const r = localStorage.getItem(LS_ROUNDS); rounds = r ? JSON.parse(r) : []; } catch(e) { rounds = []; }
  activeRoundId = localStorage.getItem(LS_ACTIVE) ? parseInt(localStorage.getItem(LS_ACTIVE)) : null;

  // migrate from old single-round format
  try {
    const old = localStorage.getItem('durian_th_v1');
    if (old && rounds.length === 0) {
      const o = JSON.parse(old);
      if (o.entries && o.entries.length > 0) {
        const m = {
          id: Date.now(), name: o.round || todayStr(),
          createdAt: new Date().toISOString(),
          confirmedPrice: o.confirmedPrice || null,
          activeGrade: o.activeGrade || 'AB',
          entries: o.entries, subRoundBreaks: o.subRoundBreaks || [],
          nextBasket: o.nextBasket || (o.entries.length + 1)
        };
        rounds.push(m);
        activeRoundId = m.id;
        saveData();
      }
    }
  } catch(e) {}
}

function saveData() {
  localStorage.setItem(LS_ROUNDS, JSON.stringify(rounds));
  if (activeRoundId !== null) localStorage.setItem(LS_ACTIVE, activeRoundId);
  else localStorage.removeItem(LS_ACTIVE);
}

function getActiveRound() { return rounds.find(r => r.id === activeRoundId) || null; }

function updateActiveRound(fn) {
  const idx = rounds.findIndex(r => r.id === activeRoundId);
  if (idx === -1) return;
  fn(rounds[idx]);
  saveData();
}

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function todayStr() {
  return new Date().toLocaleDateString('th-TH', {day:'2-digit', month:'short', year:'numeric'});
}
function fmt(n) { return (Math.round(n * 10) / 10).toFixed(1); }
function fmtComma(n) { return Number(n.toFixed(1)).toLocaleString('th-TH'); }
function fmtMoney(n) { return '฿' + Number(n.toFixed(2)).toLocaleString('th-TH'); }

function calcRoundTotals(round) {
  let ab = 0, c = 0, d = 0;
  (round.entries || []).forEach(e => {
    if (e.grade === 'AB') ab += e.weight;
    else if (e.grade === 'C') c += e.weight;
    else d += e.weight;
  });
  const total = ab + c + d;
  const money = (round.confirmedPrice && round.confirmedPrice > 0) ? total * round.confirmedPrice : 0;
  return { ab, c, d, total, money };
}

function calcYearlySummary() {
  const map = {};
  rounds.forEach(round => {
    const year = new Date(round.createdAt).getFullYear();
    if (!map[year]) map[year] = { weight: 0, money: 0 };
    const t = calcRoundTotals(round);
    map[year].weight += t.total;
    map[year].money += t.money;
  });
  return Object.keys(map)
    .map(y => ({ year: parseInt(y), weight: map[y].weight, money: map[y].money }))
    .sort((a, b) => b.year - a.year);
}

function getSubRounds(round) {
  const blocks = [], breaks = round.subRoundBreaks || [];
  let i = 0, subNum = 1;
  while (i < round.entries.length) {
    let breakAt = round.entries.length;
    for (const br of breaks) { if (br > i && br < breakAt) breakAt = br; }
    const chunk = round.entries.slice(i, Math.min(i + 5, breakAt));
    if (chunk.length === 0) { i = breakAt; continue; }
    blocks.push({ entries: chunk, subNum, startIndex: i });
    subNum++;
    i += chunk.length;
    if (i === breakAt && breakAt < round.entries.length && breaks.includes(breakAt)) i = breakAt;
  }
  return blocks;
}

/* ══════════════════════════════════════
   NAVIGATION
══════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goToSelect() {
  renderSelectScreen();
  showScreen('screen-select');
}

function goToTrack() {
  showScreen('screen-track');
  renderTrackScreen();
  setTimeout(() => document.getElementById('weight-input').focus(), 200);
}

/* ══════════════════════════════════════
   SELECTION SCREEN
══════════════════════════════════════ */
function renderSelectScreen() {
  renderYearlySummary();
  renderRoundsList();
}

function renderYearlySummary() {
  const el = document.getElementById('yearly-section');
  const years = calcYearlySummary();
  if (years.length === 0) { el.innerHTML = ''; return; }
  let html = '<div class="year-section"><div class="year-section-header"><span>📊 สรุปรายปี</span></div>';
  years.forEach(y => {
    html += `<div class="year-card">
      <div class="year-title">ปี ${y.year + 543}</div>
      <div class="year-row"><span>น้ำหนักรวม</span><strong>${fmtComma(y.weight)} กก.</strong></div>
      <div class="year-row"><span>รายได้รวม</span><strong>${fmtMoney(y.money)}</strong></div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderRoundsList() {
  const el = document.getElementById('rounds-list');
  if (rounds.length === 0) {
    el.innerHTML = '<div class="no-rounds"><div class="icon">🌵</div><p>ยังไม่มีรอบการชั่ง</p><small>กด "สร้างรอบใหม่" เพื่อเริ่มต้น</small></div>';
    return;
  }
  const sorted = [...rounds].sort((a, b) => b.id - a.id);
  let html = '';
  sorted.forEach(round => {
    const t = calcRoundTotals(round);
    const isActive = round.id === activeRoundId;
    const createdDate = new Date(round.createdAt).toLocaleDateString('th-TH', {day:'2-digit', month:'short', year:'numeric'});
    html += `<div class="round-card${isActive ? ' is-active' : ''}">
      <div class="round-card-body">
        <div class="round-card-name">
          ${round.name}${isActive ? ' <span class="active-badge">กำลังใช้</span>' : ''}
        </div>
        <div class="round-card-meta">สร้าง ${createdDate} · ${(round.entries||[]).length} เข่ง</div>
        <div class="round-card-stats">
          <div class="rstat"><div class="rl">น้ำหนักรวม</div><div class="rv">${fmtComma(t.total)} กก.</div></div>
          <div class="rstat"><div class="rl">ราคา/กก.</div><div class="rv">${round.confirmedPrice ? '฿'+round.confirmedPrice : '—'}</div></div>
          <div class="rstat"><div class="rl">ยอดเงิน</div><div class="rv">${t.money > 0 ? fmtMoney(t.money) : '—'}</div></div>
        </div>
        <div class="round-card-actions">
          <button class="btn-enter" onclick="enterRound(${round.id})">▶ เข้าใช้งาน</button>
          <button class="btn-rename" onclick="promptRename(${round.id})">✏️ แก้ชื่อ</button>
          <button class="btn-delround" onclick="deleteRound(${round.id})">🗑️ ลบ</button>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

/* ══════════════════════════════════════
   ROUND MANAGEMENT
══════════════════════════════════════ */
function promptCreateRound() {
  document.getElementById('create-round-input').value = '';
  openModal('modal-create');
  setTimeout(() => document.getElementById('create-round-input').focus(), 150);
}

function createRound() {
  const name = document.getElementById('create-round-input').value.trim() || todayStr();
  const round = {
    id: Date.now(), name, createdAt: new Date().toISOString(),
    confirmedPrice: null, activeGrade: 'AB',
    entries: [], subRoundBreaks: [], nextBasket: 1
  };
  rounds.push(round);
  activeRoundId = round.id;
  activeGrade = 'AB';
  saveData();
  closeModal('modal-create');
  goToTrack();
}

function enterRound(id) {
  activeRoundId = id;
  const round = getActiveRound();
  activeGrade = (round && round.activeGrade) || 'AB';
  saveData();
  goToTrack();
}

function promptRename(id) {
  renamingRoundId = id;
  const round = rounds.find(r => r.id === id);
  document.getElementById('rename-round-input').value = round ? round.name : '';
  openModal('modal-rename');
  setTimeout(() => document.getElementById('rename-round-input').focus(), 150);
}

function saveRename() {
  const name = document.getElementById('rename-round-input').value.trim();
  if (!name) { alert('กรุณาใส่ชื่อรอบ'); return; }
  const idx = rounds.findIndex(r => r.id === renamingRoundId);
  if (idx !== -1) rounds[idx].name = name;
  renamingRoundId = null;
  saveData();
  closeModal('modal-rename');
  renderSelectScreen();
}

function deleteRound(id) {
  const round = rounds.find(r => r.id === id);
  if (!confirm(`ลบรอบ "${round ? round.name : ''}" ?\nข้อมูลจะหายทั้งหมด ไม่สามารถกู้คืนได้`)) return;
  rounds = rounds.filter(r => r.id !== id);
  if (activeRoundId === id) activeRoundId = null;
  saveData();
  renderSelectScreen();
}

/* ══════════════════════════════════════
   TRACKING SCREEN RENDER
══════════════════════════════════════ */
function renderTrackScreen() {
  const round = getActiveRound();
  if (!round) { goToSelect(); return; }

  document.getElementById('round-name-display').textContent = round.name;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  const gb = document.getElementById('grade-' + activeGrade);
  if (gb) gb.classList.add('active');

  document.getElementById('price-input').value = round.confirmedPrice !== null ? round.confirmedPrice : '';
  document.getElementById('confirmed-price-display').innerHTML =
    round.confirmedPrice !== null
      ? 'ยืนยันแล้ว: <strong>' + fmtMoney(round.confirmedPrice) + ' / กก.</strong>'
      : 'ยังไม่ได้ยืนยันราคา';

  const totals = calcRoundTotals(round);
  document.getElementById('sum-ab').textContent = fmt(totals.ab);
  document.getElementById('sum-c').textContent = fmt(totals.c);
  document.getElementById('sum-d').textContent = fmt(totals.d);
  document.getElementById('sum-total').textContent = fmt(totals.total);
  document.getElementById('sum-grand').textContent = fmt(totals.total) + ' กก.';
  document.getElementById('sum-money').textContent = fmtMoney(totals.money);

  const blocks = getSubRounds(round);
  const container = document.getElementById('entries-container');
  if (round.entries.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>ยังไม่มีรายการ</p><small>ใส่น้ำหนักแล้วกด + ด้านบน</small></div>';
    return;
  }
  const lastId = round.entries[round.entries.length - 1].id;
  let html = '';
  blocks.forEach(block => {
    const blockWeight = block.entries.reduce((s, e) => s + e.weight, 0);
    const gc = {};
    block.entries.forEach(e => { gc[e.grade] = (gc[e.grade]||0)+1; });
    const mainGrade = Object.keys(gc).sort((a,b) => gc[b]-gc[a])[0];
    html += `<div class="block-card" id="block-${block.subNum}">
      <div class="block-header">
        <div class="block-title-left">
          <span class="grade-badge ${mainGrade}">${mainGrade}</span>
          <span class="block-subtitle">บล็อกที่ ${block.subNum}</span>
        </div>
        <span class="block-total">${fmt(blockWeight)} กก.</span>
      </div>`;
    block.entries.forEach(e => {
      html += `<div class="entry-row${e.id===lastId?' highlight':''}" id="entry-${e.id}">
        <span class="basket-num">#${e.basket}</span>
        <div class="entry-weight">${fmt(e.weight)} <span>กก.</span></div>
        <div class="entry-actions">
          <button class="btn-edit" onclick="openEdit(${e.id})">แก้ไข</button>
          <button class="btn-del" onclick="deleteEntry(${e.id})">ลบ</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  const currentCount = round.entries.length;
  const lastBreak = (round.subRoundBreaks||[]).filter(br=>br<=currentCount).sort((a,b)=>b-a)[0]||0;
  if (currentCount - lastBreak > 0) {
    html += `<button class="end-subround-btn" onclick="endSubRound()">— จบซับรอบก่อนครบ 5 ใบ —</button>`;
  }
  container.innerHTML = html;
}

/* ══════════════════════════════════════
   ENTRY OPERATIONS
══════════════════════════════════════ */
function setGrade(g) {
  activeGrade = g;
  updateActiveRound(r => { r.activeGrade = g; });
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('grade-' + g).classList.add('active');
}

function addEntry() {
  const inp = document.getElementById('weight-input');
  const val = parseFloat(inp.value);
  if (isNaN(val) || val < 1 || val > 60) {
    inp.style.borderColor = '#f87171';
    setTimeout(() => inp.style.borderColor = '', 800);
    inp.focus(); return;
  }
  const entry = { basket: 0, weight: Math.round(val*100)/100, grade: activeGrade, id: Date.now() };
  updateActiveRound(r => { entry.basket = r.nextBasket; r.entries.push(entry); r.nextBasket++; });
  inp.value = ''; inp.focus();
  if (navigator.vibrate) navigator.vibrate(40);
  renderTrackScreen();
  setTimeout(() => { const last = document.querySelector('.entry-row.highlight'); if(last) last.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 80);
}

function deleteEntry(id) {
  if (!confirm('ลบรายการนี้?')) return;
  updateActiveRound(r => {
    const idx = r.entries.findIndex(e => e.id === id);
    if (idx === -1) return;
    const basket = r.entries[idx].basket;
    r.entries.splice(idx, 1);
    r.entries.forEach(e => { if(e.basket>basket) e.basket--; });
    r.nextBasket--;
    r.subRoundBreaks = (r.subRoundBreaks||[]).map(br=>br>idx?br-1:br).filter(br=>br>0&&br<=r.entries.length);
  });
  renderTrackScreen();
}

function openEdit(id) {
  editingEntryId = id;
  const round = getActiveRound();
  const entry = round.entries.find(e => e.id === id);
  document.getElementById('edit-weight-input').value = entry.weight;
  openModal('modal-edit');
  setTimeout(() => document.getElementById('edit-weight-input').select(), 100);
}

function saveEdit() {
  const val = parseFloat(document.getElementById('edit-weight-input').value);
  if (isNaN(val) || val < 1 || val > 60) { alert('น้ำหนักต้องอยู่ระหว่าง 1–60 กก.'); return; }
  updateActiveRound(r => { const e = r.entries.find(e=>e.id===editingEntryId); if(e) e.weight=Math.round(val*100)/100; });
  editingEntryId = null;
  closeModal('modal-edit');
  renderTrackScreen();
}

function undoLast() {
  const round = getActiveRound();
  if (!round || round.entries.length === 0) return;
  if (!confirm('ลบรายการล่าสุด?')) return;
  updateActiveRound(r => { r.entries.pop(); r.nextBasket--; r.subRoundBreaks=(r.subRoundBreaks||[]).filter(br=>br<=r.entries.length); });
  renderTrackScreen();
}

function deleteLastSubRound() {
  const round = getActiveRound();
  if (!round) return;
  const blocks = getSubRounds(round);
  if (blocks.length === 0) return;
  if (!confirm('ลบบล็อกล่าสุด?')) return;
  const last = blocks[blocks.length-1];
  updateActiveRound(r => {
    r.entries.splice(last.startIndex);
    r.nextBasket = r.entries.length > 0 ? r.entries[r.entries.length-1].basket+1 : 1;
    r.subRoundBreaks = (r.subRoundBreaks||[]).filter(br=>br<=r.entries.length);
  });
  renderTrackScreen();
}

function endSubRound() {
  const round = getActiveRound();
  if (!round || round.entries.length === 0) return;
  const br = round.entries.length;
  updateActiveRound(r => {
    if (!r.subRoundBreaks) r.subRoundBreaks = [];
    if (!r.subRoundBreaks.includes(br)) { r.subRoundBreaks.push(br); r.subRoundBreaks.sort((a,b)=>a-b); }
  });
  renderTrackScreen();
}

function resetActiveRound() {
  if (!confirm('รีเซ็ตข้อมูลในรอบนี้ทั้งหมด?\nไม่สามารถกู้คืนได้')) return;
  updateActiveRound(r => { r.entries=[]; r.subRoundBreaks=[]; r.nextBasket=1; r.confirmedPrice=null; });
  document.getElementById('price-input').value = '';
  renderTrackScreen();
}

function confirmPrice() {
  const val = parseFloat(document.getElementById('price-input').value);
  if (isNaN(val) || val < 0) { alert('กรุณาใส่ราคาที่ถูกต้อง'); return; }
  updateActiveRound(r => { r.confirmedPrice = Math.round(val*100)/100; });
  renderTrackScreen();
}

/* ══════════════════════════════════════
   EXPORT CSV
══════════════════════════════════════ */
function exportCSV() {
  const round = getActiveRound();
  if (!round) return;
  const totals = calcRoundTotals(round);
  const price = round.confirmedPrice || 0;
  const abCnt = round.entries.filter(e=>e.grade==='AB').length;
  const cCnt  = round.entries.filter(e=>e.grade==='C').length;
  const dCnt  = round.entries.filter(e=>e.grade==='D').length;
  let csv = '\uFEFF';
  csv += 'รอบ,' + round.name + '\n';
  csv += 'ส่งออกเมื่อ,' + new Date().toLocaleString('th-TH') + '\n\n';
  csv += 'เกรด,จำนวนตะกร้า,น้ำหนักรวม (กก.),ราคา/กก.,ยอดเงิน\n';
  [{g:'AB',cnt:abCnt,w:totals.ab},{g:'C',cnt:cCnt,w:totals.c},{g:'D',cnt:dCnt,w:totals.d}].forEach(r => {
    csv += `${r.g},${r.cnt},${fmt(r.w)},${price},${(r.w*price).toFixed(2)}\n`;
  });
  csv += `\nรวมทั้งหมด,${round.entries.length},${fmt(totals.total)},${price},${(totals.total*price).toFixed(2)}\n`;
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ทุเรียน_' + round.name.replace(/[^ก-๙a-z0-9]/gi,'_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

/* ══════════════════════════════════════
   MODAL HELPERS
══════════════════════════════════════ */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ══════════════════════════════════════
   EVENT LISTENERS
══════════════════════════════════════ */
document.getElementById('weight-input').addEventListener('keydown', e => { if(e.key==='Enter') addEntry(); });
document.getElementById('create-round-input').addEventListener('keydown', e => { if(e.key==='Enter') createRound(); });
document.getElementById('rename-round-input').addEventListener('keydown', e => { if(e.key==='Enter') saveRename(); });
document.getElementById('edit-weight-input').addEventListener('keydown', e => { if(e.key==='Enter') saveEdit(); });
['modal-create','modal-rename','modal-edit'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if(e.target===document.getElementById(id)) closeModal(id); });
});

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
loadData();
if (activeRoundId && rounds.find(r => r.id === activeRoundId)) {
  const round = getActiveRound();
  activeGrade = (round && round.activeGrade) || 'AB';
  goToTrack();
} else {
  renderSelectScreen();
  showScreen('screen-select');
}
</script>
