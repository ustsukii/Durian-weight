<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durian Pro</title>

<style>
body { margin:0; font-family:sans-serif; background:#f4f6f5; }
.top { display:flex; gap:6px; padding:10px; background:#fff; }
input { flex:1; padding:16px; font-size:20px; border-radius:10px; }
button { padding:14px; border:none; border-radius:10px; cursor:pointer; }

.ab { background:#2e7d32; color:#fff; flex:1; }
.c { background:#c62828; color:#fff; }
.d { background:#424242; color:#fff; }

.active { border:3px solid black; }

.group { background:#fff; margin:10px; padding:10px; border-radius:10px; }
.status { text-align:center; padding:6px; }

.bottom {
 position:fixed; bottom:0; width:100%;
 background:#1b5e20; color:#fff;
 padding:12px;
}
</style>
</head>

<body>

<div class="top">
  <input id="roundName" placeholder="ชื่อรอบ">
  <button onclick="newRound()">🌳</button>
</div>

<div class="status" id="status"></div>

<div class="top">
  <input id="input" type="number" placeholder="kg 1-60">
  <button onclick="add()">➕</button>
</div>

<div class="top">
  <button id="abBtn" class="ab active" onclick="setMode('AB')">AB</button>
  <button id="cBtn" class="c" onclick="setMode('C')">C</button>
  <button id="dBtn" class="d" onclick="setMode('D')">D</button>
</div>

<div class="top">
  <button onclick="endRound()">จบรอบ</button>
  <button onclick="undo()">Undo</button>
</div>

<div class="top">
  <input id="price" type="number" placeholder="บาท/กก">
</div>

<div class="top">
  💰 เงินรวม: <b id="money">0</b> บาท
</div>

<div class="top">
  <button onclick="exportExcel()">📊 Export</button>
</div>

<div id="list" style="padding-bottom:160px;"></div>

<div class="bottom">
  🟢AB: <span id="sumAB">0</span> kg<br>
  🔴C: <span id="sumC">0</span> kg | ⚫D: <span id="sumD">0</span> kg<br>
  🔥 รวม: <span id="total">0</span> kg
</div>

<script>
let round = JSON.parse(localStorage.getItem("durianRound")) || null;
let mode = "AB";

function save(){ localStorage.setItem("durianRound", JSON.stringify(round)); }

function newRound(){
  round = { name: roundName.value, data: [] };
  save(); render();
}

function setMode(m){
  mode=m;
  abBtn.classList.remove("active");
  cBtn.classList.remove("active");
  dBtn.classList.remove("active");

  if(m==="AB") abBtn.classList.add("active");
  if(m==="C") cBtn.classList.add("active");
  if(m==="D") dBtn.classList.add("active");
}

function add(){
  if(!round) return alert("เริ่มรอบก่อน");
  let v=parseFloat(input.value);
  if(!v||v<1||v>60) return alert("1-60 kg");

  round.data.push({w:v,t:mode});
  input.value="";
  input.focus();

  save(); render();
}

function undo(){
  if(round && round.data.length){
    round.data.pop();
    save(); render();
  }
}

function endRound(){
  if(round){
    round.data.push({break:true});
    save(); render();
  }
}

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  if(!round) return;

  let sumAB=0,sumC=0,sumD=0;
  let price=parseFloat(priceInput?.value || document.getElementById("price").value)||0;

  let basketCount=0;

  round.data.forEach((d,i)=>{
    if(d.break){
      let div=document.createElement("div");
      div.className="group";
      div.innerHTML="<b>--- จบรอบ ---</b>";
      list.appendChild(div);
      return;
    }

    basketCount++;

    if(d.t==="AB") sumAB+=d.w;
    if(d.t==="C") sumC+=d.w;
    if(d.t==="D") sumD+=d.w;

    let div=document.createElement("div");
    div.className="group";
    div.innerHTML=`${d.t} | เข่ง ${basketCount} = ${d.w} kg`;
    list.appendChild(div);
  });

  let total=sumAB+sumC+sumD;

  document.getElementById("sumAB").innerText=sumAB.toFixed(2);
  document.getElementById("sumC").innerText=sumC.toFixed(2);
  document.getElementById("sumD").innerText=sumD.toFixed(2);
  document.getElementById("total").innerText=total.toFixed(2);

  document.getElementById("money").innerText=(total*price).toLocaleString();
}

function exportExcel(){
  if(!round) return;

  let price=parseFloat(document.getElementById("price").value)||0;

  let csv="รอบ,เกรด,เข่ง,kg,ราคา/กก,เงิน\n";

  let count=0;
  let sumAB=0,sumC=0,sumD=0;

  round.data.forEach(d=>{
    if(d.break) return;

    count++;

    let money=d.w*price;

    csv+=`${round.name},${d.t},${count},${d.w},${price},${money}\n`;

    if(d.t==="AB") sumAB+=d.w;
    if(d.t==="C") sumC+=d.w;
    if(d.t==="D") sumD+=d.w;
  });

  let total=sumAB+sumC+sumD;

  csv+=`\nสรุป\n`;
  csv+=`AB,, ,${sumAB},,${sumAB*price}\n`;
  csv+=`C,, ,${sumC},,${sumC*price}\n`;
  csv+=`D,, ,${sumD},,${sumD*price}\n`;
  csv+=`รวมทั้งหมด,, ,${total},,${total*price}\n`;
  csv+=`ราคา/กก,, ,${price}\n`;

  let blob=new Blob(["\uFEFF"+csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="durian_export.csv";
  a.click();
}

render();
</script>

</body>
</html>
