<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🌴 ระบบสวนทุเรียน Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #0D1B2A 0%, #1B3A5C 50%, #0A3D62 100%);
    padding: 32px 20px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Stars background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 85%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
  }

  /* ── Logo ── */
  .home-logo {
    font-size: 76px;
    margin-bottom: 14px;
    animation: float 3.5s ease-in-out infinite;
    filter: drop-shadow(0 8px 24px rgba(0,200,100,0.3));
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-12px); }
  }

  .home-title {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 6px;
  }
  .home-subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-bottom: 48px;
    font-weight: 400;
    line-height: 1.5;
  }

  /* ── Cards ── */
  .home-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .home-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 22px 22px;
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }
  .home-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    opacity: 0;
    transition: opacity 0.22s ease;
  }
  .home-card.weigh::before { background: radial-gradient(circle at 30% 50%, rgba(0,122,255,0.15), transparent 70%); }
  .home-card.farm::before  { background: radial-gradient(circle at 30% 50%, rgba(48,209,88,0.15), transparent 70%); }
  .home-card:hover::before { opacity: 1; }
  .home-card:hover {
    background: rgba(255,255,255,0.14);
    transform: translateY(-3px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.35);
  }
  .home-card:active { transform: scale(0.97); }

  .home-card.weigh { border-color: rgba(0,122,255,0.35); }
  .home-card.farm  { border-color: rgba(48,209,88,0.35); }

  .card-icon-wrap {
    width: 56px; height: 56px; flex-shrink: 0;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .home-card.weigh .card-icon-wrap { background: rgba(0,122,255,0.2); }
  .home-card.farm  .card-icon-wrap { background: rgba(48,209,88,0.2); }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  .card-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    line-height: 1.4;
  }

  .card-arrow {
    font-size: 20px;
    color: rgba(255,255,255,0.3);
    flex-shrink: 0;
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .home-card:hover .card-arrow {
    transform: translateX(4px);
    color: rgba(255,255,255,0.6);
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 28px 0 20px;
  }

  /* ── Footer ── */
  .home-footer {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    text-align: center;
    line-height: 1.8;
  }
  .home-footer a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    font-size: 11px;
  }
  .home-footer a:hover { color: rgba(255,255,255,0.6); }

  /* ── Badge ── */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(48,209,88,0.18);
    border: 1px solid rgba(48,209,88,0.35);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #30D158;
    margin-bottom: 28px;
    letter-spacing: 0.3px;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: #30D158;
    border-radius: 50%;
    animation: livePulse 1.5s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  @media (max-width: 400px) {
    .home-logo { font-size: 60px; }
    .home-title { font-size: 24px; }
    .card-name { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="home-logo">🌴</div>
  <div class="home-title">ระบบสวนทุเรียน Pro</div>
  <div class="home-subtitle">เลือกระบบที่ต้องการใช้งาน</div>

  <div class="live-badge">
    <span class="live-dot"></span>
    Firebase Real-time Sync
  </div>

  <div class="home-cards">

    <a class="home-card weigh"
       href="https://ustsukii.github.io/Durian-weight/weigh.html"
       target="_blank" rel="noopener noreferrer">
      <div class="card-icon-wrap">⚖️</div>
      <div class="card-info">
        <div class="card-name">ระบบชั่งน้ำหนัก</div>
        <div class="card-desc">บันทึก ชั่ง คำนวณ สรุปยอด<br>TV Mode · สลิป · CSV Export</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="home-card farm"
       href="https://ustsukii.github.io/Durian-weight/farm.html"
       target="_blank" rel="noopener noreferrer">
      <div class="card-icon-wrap">🌳</div>
      <div class="card-info">
        <div class="card-name">ระบบจัดการสวน</div>
        <div class="card-desc">ติดตามต้นทุเรียน · แผนที่สวน<br>Firebase Sync · 182 บล็อก</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </div>

  <div class="divider"></div>

  <div class="home-footer">
    🔥 Powered by Firebase &nbsp;·&nbsp; ข้อมูล Real-time Sync<br>
    <a href="https://ustsukii.github.io/Durian-weight/weigh.html" target="_blank">weigh.html</a>
    &nbsp;·&nbsp;
    <a href="https://ustsukii.github.io/Durian-weight/farm.html" target="_blank">farm.html</a>
  </div>

</div>

</body>
</html>
